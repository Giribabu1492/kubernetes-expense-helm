apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: expense
spec:
  serviceName: "mysql-headless"
  replicas: 1

  selector:
    matchLabels:
      app: mysql
      project: expense
      tier: db

  template:
    metadata:
      labels:
        app: mysql
        project: expense
        tier: db

    spec:
      containers:
        - name: mysql
          image: giri1492/mysql:1.0.0
          volumeMounts:
            - name: mysql
              mountPath: /var/lib/mysql

  volumeClaimTemplates:
    - metadata:
        name: mysql
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: expense-ebs
        resources:
          requests:
            storage: 1Gi